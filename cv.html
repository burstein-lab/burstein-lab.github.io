<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    #dlbtn-desktop {
      display: flex;
      position: fixed;
      bottom: 10px;
      right: 10px;
      z-index: 999;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-family: sans-serif;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      align-items: center;
      gap: 8px;
    }
    #dlbtn-mobile {
      display: none;
      position: fixed;
      bottom: 10px;
      right: 10px;
      z-index: 999;
      background: #2563eb;
      color: white;
      text-decoration: none;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 500px) {
      #dlbtn-desktop { display: none; }
      #dlbtn-mobile  { display: flex; }
    }
  </style>
</head>
<body style="margin:0;overflow:hidden;height:100vh">

  <a href="DavidBurstein.CV.pdf" download id="dlbtn-desktop">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 24 24">
      <path d="M12 16l-6-6h4V4h4v6h4l-6 6z"/>
      <path d="M4 20h16v-2H4v2z"/>
    </svg>
    Download CV
  </a>

  <a href="DavidBurstein.CV.pdf" download id="dlbtn-mobile">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="white" viewBox="0 0 24 24">
      <path d="M12 16l-6-6h4V4h4v6h4l-6 6z"/>
      <path d="M4 20h16v-2H4v2z"/>
    </svg>
  </a>

  <iframe 
    src="https://docs.google.com/viewer?url=https://burstein-lab.github.io/DavidBurstein.CV.pdf&embedded=true"
    width="100%" height="100%" frameborder="0">
  </iframe>

</body>
</html>
